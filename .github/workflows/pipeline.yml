name: 🚀 CI/CD Pipeline - SeniorInsight AI

on:
  push:
    branches: [ "main", "develop", "dev*", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # TESTES (Roda em TODAS as branches)
  # ==========================================
  test:
    name: 🧪 Rodar Testes e Qualidade
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar o Repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: 🐘 Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🛠️ Compilar e Rodar Testes
        run: ./gradlew clean build test

      - name: 📊 Gerar Relatório de Cobertura
        run: ./gradlew jacocoTestReport
        continue-on-error: true

      # Upload dos artefatos de teste
      - name: 📤 Upload Relatório de Testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/

  # ==========================================
  # DEPLOY EM STAGING (develop)
  # Só roda em 'develop' se testes passarem
  # ==========================================
  deploy-staging:
    name: 🚀 Deploy em STAGING (develop)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: 🐘 Build para Deploy
        run: ./gradlew build -x test

      - name: ☁️ Deploy no Heroku Staging
        uses: akhileshns/heroku-deploy@v3.12.14
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_email: ${{secrets.HEROKU_EMAIL}}
          heroku_app_name: 'seniorinsight-staging'
        continue-on-error: true

  # ==========================================
  # DEPLOY EM PRODUÇÃO (main)
  # Só roda em 'main' se testes passarem
  # ==========================================
  deploy-production:
    name: 🚀 Deploy em PRODUÇÃO (main)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Clonar Repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: 🐘 Build para Deploy
        run: ./gradlew build -x test

      - name: ☁️ Deploy no Heroku Produção
        uses: akhileshns/heroku-deploy@v3.12.14
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_email: ${{secrets.HEROKU_EMAIL}}
          heroku_app_name: 'seniorinsight-api'
        continue-on-error: true

      - name: 📢 Notificação de Deploy
        run: echo "✅ Deploy em PRODUÇÃO concluído com sucesso!"
